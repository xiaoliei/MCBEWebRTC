# MCBEWebRTC 基础 Docker Compose 配置
# 定义服务构建和通用配置，端口/卷/命令等环境特定设置在 override 文件中定义
#
# 使用方式：
#   开发环境（自动加载 docker-compose.override.yml）：docker compose up --build
#   生产环境：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mcbewebrtc-backend
    env_file:
      - ./backend/.env

  mcwss:
    build:
      context: .
      dockerfile: mcwss/Dockerfile
    container_name: mcbewebrtc-mcwss
    env_file:
      - ./mcwss/.env
    environment:
      # Docker 网络内部通过服务名访问 backend
      - BACKEND_URL=http://backend:3000
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mcbewebrtc-frontend
